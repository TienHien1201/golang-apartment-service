name: CI — Build & Push

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  IMAGE: tienhiendev/service_apartment_business
  # Tắt warning "Node.js 20 deprecated" — bắt buộc trước June 2026
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Lint & Test ───────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # cache: true giữ để tăng tốc khi cache available.
          # go mod download bên dưới đảm bảo modules luôn có sẵn
          # ngay cả khi cache miss (400 / key thay đổi / lần đầu chạy).
          cache: true

      # ── FIX CHÍNH ──────────────────────────────────────────────────────
      # Luôn chạy download tường minh — không phụ thuộc cache.
      # Khi cache miss xảy ra (GitHub trả 400), bước này đảm bảo tất cả
      # external packages (echo, jwt, elasticsearch...) có mặt trong
      # GOMODCACHE trước khi golangci-lint chạy typecheck.
      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      # golangci-lint-action@v6 + v1.64.x: hỗ trợ Go 1.24 và toolchain directive.
      # v1.56.0 (cũ) không hiểu "toolchain go1.24.6" → typecheck crash toàn bộ.
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          # Truyền GOMODCACHE đã có modules vào lint để tránh re-download
          args: --timeout=5m

      - name: Unit tests
        run: go test -race ./...

  # ── Job 2: Build & Push Docker image ────────────────────────────────────
  # Chỉ push khi merge vào main hoặc tag — không push từ PR
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - uses: docker/setup-buildx-action@v3

      # Dùng login-action — password không bị lộ trong process list
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions layer cache → build lần 2+ nhanh hơn ~3-5x
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
