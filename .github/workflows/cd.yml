name: CD — Deploy

on:
  workflow_run:
    workflows: ['CI — Build & Push']
    types: [completed]

jobs:
  deploy:
    name: Deploy to Server
    # Chỉ deploy khi CI thành công — không deploy khi CI fail
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on:
      - self-hosted
      - be-apartment_business
    steps:
      # ─── BƯỚC 1: Checkout ──────────────────────────────────────────────────────
      # clean: false — KHÔNG chạy "git clean -ffdx"
      # Giữ lại các file gitignored trong workspace (.env, attachments/...).
      # Mặc định clean: true sẽ xóa .env → docker compose fail ngay bước tiếp theo.
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          clean: false

      # ─── BƯỚC 2: Đảm bảo .env tồn tại (defensive, 3-layer fallback) ───────────
      # Layer 1 — Happy path: .env đã có trong workspace (clean: false giữ lại từ lần trước)
      # Layer 2 — Recovery:   workspace bị reset lần đầu → lấy từ persistent secrets store
      #                       nằm NGOÀI workspace (không bị git clean xóa bao giờ)
      # Layer 3 — Hard fail:  cả hai đều không có → in hướng dẫn setup rõ ràng rồi exit 1
      - name: Ensure .env is available
        run: |
          if [ -f .env ]; then
            echo "✅ .env found in workspace (preserved by clean: false)"
            exit 0
          fi

          SECRETS_SRC="/root/apartment-service-secrets/.env"
          if [ -f "$SECRETS_SRC" ]; then
            cp "$SECRETS_SRC" .env
            echo "✅ .env restored from persistent secrets store: $SECRETS_SRC"
            exit 0
          fi

          echo ""
          echo "❌ .env not found in workspace or secrets store."
          echo "One-time server setup required (chỉ làm 1 lần):"
          echo ""
          echo "  mkdir -p /root/apartment-service-secrets"
          echo "  cp /path/to/your/.env /root/apartment-service-secrets/.env"
          echo "  chmod 600 /root/apartment-service-secrets/.env"
          echo ""
          exit 1

      # ─── BƯỚC 3+: Deploy ───────────────────────────────────────────────────────
      # Đảm bảo toàn bộ stack đang chạy (idempotent — an toàn cả lần đầu lẫn lần sau)
      - name: Ensure stack is up
        run: docker compose up -d --remove-orphans

      # Pull backend image mới từ registry
      - name: Pull latest backend image
        run: docker compose pull service_apartment_business

      # Chỉ recreate backend — không restart DB/Redis/ES, không mất data
      - name: Recreate backend container
        run: docker compose up -d --no-deps --force-recreate service_apartment_business

      # Chờ health check xanh rồi mới xem là deploy thành công
      - name: Wait for health check
        run: |
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' con_be_apartment_business 2>/dev/null || echo "missing")
            echo "  attempt $i/24 — status: $STATUS"
            [ "$STATUS" = "healthy" ] && { echo "✅ Healthy!"; exit 0; }
            sleep 5
          done
          echo "❌ Container not healthy after 120s"
          docker compose logs --tail=80 service_apartment_business
          exit 1

      # Dọn image layer cũ để tiết kiệm disk
      - name: Prune old images
        run: docker image prune -f
